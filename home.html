<html>

<head>
    <title>My Quiz app</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="nav-bar">
        <h3 class="nav-title">My Quiz app</h3>
    </nav>

    <div class="main-div">
        <form>
            <label class="category-label">category</label>
            <select name="category" id="category" class="category-select">
                <option value="DBMS">DBMS</option>
                <option value="OS">OS</option>
                <option value="Java">Java</option>
            </select>
            <br />
            <label class="difficulty-label">Difficulty</label>
            <select name="difficulty" id="difficulty" class="difficulty-select">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
            <br />
            <p class="nb-qestion">Number of Questions : 15</p>
            <p class="">Total Time is 20 minutes</p>
            <button id="save" type="button">Start Quiz</button>
        </form>
        <!-- <div id="best-score">
            <h3>Best Score :</h3>
            <ul id="score-list">

            </ul>
        </div> -->
    </div>

    <div id="quiz-question" class="question-class hidden">

        <span id="qp-category">Category : </span>
        <span id="display-category"></span>
        <span id="num-question">Questions :</span>
        <span id="display-num-question"></span>
        <span id="display-time-quiz"></span>
        <span id="display-overall-time"></span>
        <div id="question-section">
            <h3 id="progress">Progress</h3>
            <span id="display-progress"></span>

            <h3>Question :</h3>
            <div id="display-all-question">
            </div>
        </div>
        <button type="button" id="previous">Previous</button>
        <button type="button" id="next" disabled>Next</button>
        <button type="button" id="submit-quiz">Submit Quiz</button>
    </div>
    <div id="result-quiz" class="result-container">
        <h2>Quiz Result</h2>
        <p id="score">Score :</p>
        <span id="display-score"></span>
        <p id="time-taken"></p>
        <button id="view-answer">Review answer</button>
        <button id="retry-quiz">Retry</button>
        <button id="home-page" onclick="location.href='home.html'">Go Home Page</button>

    </div>

    <div id="answer-review" class="answer-container">
        <h2>Answer Review</h2>
        <div id="review-section">
        </div>
    </div>

    <div id="attempt-container" class="attempt-container">
        <div id="attempted-detail-section"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
