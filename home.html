<!DOCTYPE html>
<html>

<head>
    <title>My Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="nav-bar">
        <h3 class="nav-title">My Quiz app</h3>
    </nav>

    <div id="main-div" class="main-div">
        <form class="form-tag">
            <label class="category-label">Category</label>
            <select id="category">
                <option value="DBMS">DBMS</option>
                <option value="OS">OS</option>
                <option value="Java">Java</option>
            </select>

            <label class="difficulty-label">Difficulty</label>
            <select id="difficulty">
                <option>Easy</option>
                <option>Medium</option>
                <option>Hard</option>
            </select>

            <p class="num-questions">Number of Questions : 15</p>
            <p class="total-time">Total Time is 3 minutes : 45 seconds</p>

            <button id="save" type="button" class="start-button" onclick="startQuiz()">Start Quiz</button>
            <p class="note-para">Note: Once you start the quiz you can't pause it.</p>
        </form>
        <div class="best-scores-category">
            <p class="best-scores-heading">Best Scores by Category</p>
            <div class="scores-list">
                <p id="score-dbms" class="score-item"></p> 
                <p id="score-os" class="score-item"></p>
                <p id="score-java" class="score-item"></p>
        </div>
    </div>

    <script src="js/data.js"></script>
<script src="js/home.js"></script>
</body>

</html>
