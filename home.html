<!DOCTYPE html>
<html>

<head>
    <title>My Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="nav-bar">
        <h3 class="nav-title">My Quiz app</h3>
    </nav>

    <div class="main-div">
        <form class="form-tag">
            <label class="category-label">Category</label>
            <select id="category">
                <option value="DBMS">DBMS</option>
                <option value="OS">OS</option>
                <option value="Java">Java</option>
            </select>

            <label class="difficulty-label">Difficulty</label>
            <select id="difficulty">
                <option>Easy</option>
                <option>Medium</option>
                <option>Hard</option>
            </select>

            <p class="num-questions">Number of Questions : 15</p>
            <p class="total-time">Total Time is 20 minutes</p>

            <button id="save" type="button" class="start-button">Start Quiz</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
